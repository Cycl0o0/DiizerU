openapi: 3.1.0
info:
  title: DiizerU Relay API
  version: 1.0.0
  description: |
    Client (Wii U) <-> Relay control + audio API. SOURCE OF TRUTH for both
    components. Identical wire format in `central` and `self-hosted` RELAY_MODE
    (only base URL / onboarding differ). Major version pinned in the path (`/v1`).

    Auth: after pairing, the client sends `Authorization: Bearer <relay_session_token>`.
    This token is NOT a Spotify token. Spotify tokens never leave the relay.
servers:
  - url: https://your-domain.example/v1
    description: central beta
  - url: http://{host}:{port}/v1
    description: self-hosted
    variables:
      host: { default: "127.0.0.1" }
      port: { default: "8080" }

tags:
  - { name: meta }
  - { name: pairing }
  - { name: browse }
  - { name: playback }
  - { name: queue }
  - { name: stream }
  - { name: admin }

paths:
  /capabilities:
    get:
      tags: [meta]
      summary: Feature/version discovery (client feature-detects here)
      security: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capabilities" }

  /pair/start:
    post:
      tags: [pairing]
      summary: Begin device-code pairing. Console calls this on first launch.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                device_name: { type: string, example: "Wii U Salon" }
      responses:
        "200":
          description: device code issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PairStart" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/Busy" }

  /pair/poll:
    post:
      tags: [pairing]
      summary: Poll pairing status. Returns relay session token once user approves.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_code]
              properties:
                device_code: { type: string }
      responses:
        "200":
          description: status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PairPoll" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /me:
    get:
      tags: [meta]
      summary: Current paired user profile (no Spotify token exposed)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /search:
    get:
      tags: [browse]
      summary: Search (proxied to Spotify Web API server-side)
      parameters:
        - { name: q, in: query, required: true, schema: { type: string } }
        - name: type
          in: query
          schema:
            type: string
            default: "track,album,artist,playlist"
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 50 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResults" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /browse/playlists:
    get:
      tags: [browse]
      summary: User's playlists
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Playlist" } }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /browse/playlist/{id}:
    get:
      tags: [browse]
      summary: Playlist tracks
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  playlist: { $ref: "#/components/schemas/Playlist" }
                  tracks: { type: array, items: { $ref: "#/components/schemas/Track" } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /browse/album/{id}:
    get:
      tags: [browse]
      summary: Album tracks
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  album: { $ref: "#/components/schemas/Album" }
                  tracks: { type: array, items: { $ref: "#/components/schemas/Track" } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /browse/artist/{id}:
    get:
      tags: [browse]
      summary: Artist top tracks + albums
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  artist: { $ref: "#/components/schemas/Artist" }
                  top_tracks: { type: array, items: { $ref: "#/components/schemas/Track" } }
                  albums: { type: array, items: { $ref: "#/components/schemas/Album" } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /browse/favorites:
    get:
      tags: [browse]
      summary: Saved/liked tracks
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  tracks: { type: array, items: { $ref: "#/components/schemas/Track" } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /playback:
    get:
      tags: [playback]
      summary: Now-playing snapshot
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaybackState" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /playback/command:
    post:
      tags: [playback]
      summary: Control playback
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaybackCommand" }
      responses:
        "200":
          description: new state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaybackState" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /queue:
    get:
      tags: [queue]
      summary: Current queue
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Queue" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [queue]
      summary: Mutate queue (add / move / remove / clear / replace)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QueueCommand" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Queue" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /stream:
    get:
      tags: [stream]
      summary: HTTP chunked audio of the active session's playback
      description: |
        Returns an endless chunked body of raw audio in the negotiated format.
        v1 default is `pcm_s16le` 44.1kHz stereo (~1.41 Mbps). The client pulls
        this into its ring buffer; the relay drives librespot from playback cmds.
      parameters:
        - name: fmt
          in: query
          schema:
            type: string
            enum: [pcm_s16le]
            default: pcm_s16le
      responses:
        "200":
          description: chunked audio stream
          headers:
            X-Sample-Rate: { schema: { type: integer }, description: e.g. 44100 }
            X-Channels: { schema: { type: integer }, description: e.g. 2 }
            X-Sample-Format: { schema: { type: string }, description: e.g. s16le }
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/Busy" }

  /ws:
    get:
      tags: [playback]
      summary: WebSocket upgrade for push events (see ws-events.schema.json)
      description: Server pushes PlaybackState / Queue / Error events. Auth via bearer in upgrade.
      responses:
        "101": { description: switching protocols }

  /admin/invite:
    post:
      tags: [admin]
      summary: Generate single-use invite code
      security: [{ adminAuth: [] }]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: string }
                  expires_at: { type: string, format: date-time }

  /admin/allow/{user_id}:
    put:
      tags: [admin]
      summary: Add a Spotify user-id to allowlist
      security: [{ adminAuth: [] }]
      parameters:
        - { name: user_id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: added }

  /admin/revoke/{user_id}:
    post:
      tags: [admin]
      summary: Revoke a user — delete tokens, kill session, invalidate relay token
      security: [{ adminAuth: [] }]
      parameters:
        - { name: user_id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: revoked }

  /admin/killswitch:
    post:
      tags: [admin]
      summary: Global kill switch — tear down all sessions, refuse new ones
      security: [{ adminAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean, default: true }
      responses:
        "204": { description: applied }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: relay session token from /pair/poll
    adminAuth:
      type: http
      scheme: bearer
      description: DIIZERU_ADMIN_TOKEN (separate from user auth)
  security:
    - bearerAuth: []

  responses:
    Unauthorized:
      description: missing/invalid relay session token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: too many requests
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Busy:
      description: max concurrent sessions reached or kill switch active
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }

    Capabilities:
      type: object
      properties:
        api_version: { type: string, example: "1.0.0" }
        relay_mode: { type: string, enum: [central, self-hosted] }
        audio_formats: { type: array, items: { type: string }, example: ["pcm_s16le"] }
        sample_rate: { type: integer, example: 44100 }
        channels: { type: integer, example: 2 }

    PairStart:
      type: object
      required: [device_code, user_code, verify_url, interval, expires_in]
      properties:
        device_code: { type: string, description: secret, polled by console }
        user_code: { type: string, description: shown on TV, entered on phone }
        verify_url: { type: string, example: "https://your-domain.example/pair" }
        interval: { type: integer, description: poll seconds, example: 5 }
        expires_in: { type: integer, example: 900 }

    PairPoll:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, approved, denied, expired]
        relay_session_token:
          type: string
          description: present only when status=approved; opaque, NOT a Spotify token

    Me:
      type: object
      properties:
        user_id: { type: string }
        display_name: { type: string }
        product: { type: string, example: premium }

    Image:
      type: object
      properties:
        url: { type: string }
        width: { type: integer }
        height: { type: integer }

    Artist:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        images: { type: array, items: { $ref: "#/components/schemas/Image" } }

    Album:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        artists: { type: array, items: { $ref: "#/components/schemas/Artist" } }
        images: { type: array, items: { $ref: "#/components/schemas/Image" } }

    Track:
      type: object
      properties:
        id: { type: string }
        uri: { type: string, example: "spotify:track:..." }
        name: { type: string }
        duration_ms: { type: integer }
        artists: { type: array, items: { $ref: "#/components/schemas/Artist" } }
        album: { $ref: "#/components/schemas/Album" }

    Playlist:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        owner: { type: string }
        track_count: { type: integer }
        images: { type: array, items: { $ref: "#/components/schemas/Image" } }

    SearchResults:
      type: object
      properties:
        tracks: { type: array, items: { $ref: "#/components/schemas/Track" } }
        albums: { type: array, items: { $ref: "#/components/schemas/Album" } }
        artists: { type: array, items: { $ref: "#/components/schemas/Artist" } }
        playlists: { type: array, items: { $ref: "#/components/schemas/Playlist" } }

    PlaybackCommand:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [play, pause, toggle, next, prev, seek, set_repeat, set_shuffle, play_uri]
        position_ms: { type: integer, description: for seek }
        repeat: { type: string, enum: [off, one, all], description: for set_repeat }
        shuffle: { type: boolean, description: for set_shuffle }
        uri: { type: string, description: for play_uri (track/album/playlist) }
        context_uris:
          type: array
          items: { type: string }
          description: optional explicit track list for play_uri

    PlaybackState:
      type: object
      properties:
        state: { type: string, enum: [stopped, loading, playing, paused, error] }
        track: { $ref: "#/components/schemas/Track" }
        position_ms: { type: integer }
        duration_ms: { type: integer }
        repeat: { type: string, enum: [off, one, all] }
        shuffle: { type: boolean }
        error: { type: string }

    Queue:
      type: object
      properties:
        current_index: { type: integer }
        items: { type: array, items: { $ref: "#/components/schemas/Track" } }

    QueueCommand:
      type: object
      required: [op]
      properties:
        op: { type: string, enum: [add, move, remove, clear, replace] }
        uri: { type: string, description: for add }
        uris: { type: array, items: { type: string }, description: for replace }
        from_index: { type: integer, description: for move }
        to_index: { type: integer, description: for move }
        index: { type: integer, description: for remove }
