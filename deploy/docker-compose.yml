# DiizerU central deployment: relay + Caddy TLS reverse proxy.
# Target: DigitalOcean droplet, domain your-domain.example.
#
#   cp ../relay/.env.example .env   # fill secrets
#   docker compose up -d --build
services:
  relay:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      BIND_ADDR: 0.0.0.0:8080
    volumes:
      - relay_data:/data
    expose:
      - "8080"
    # Per-container resource bounds protect the beta VPS (SECURITY.md / session mgr).
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [relay]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  relay_data:
  caddy_data:
  caddy_config:
